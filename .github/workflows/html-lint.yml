name: Validar HTML

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: htmlhint "**/*.html"
