name: CI Pipeline

on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  pull_request:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

jobs:
  html-lint:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: htmlhint "**/*.html"

  tests:
    name: Correr Tests
    needs: html-lint
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Correr tests
        run: node test.js

  link-checker:
    name: Chequeo de Links
    needs: tests
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chequear links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.html' '**/*.md'
          fail: true

  deploy:
    name: Deploy a GitHub Pages
    needs: link-checker
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    name: Notificar a Discord
    needs: [html-lint, tests, link-checker, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ${{ (needs.html-lint.result == 'success' && needs.tests.result == 'success' && needs.link-checker.result == 'success' && needs.deploy.result == 'success') && '✅ Pipeline exitoso' || '❌ Pipeline fallido' }}
            📦 Repo: `${{ github.repository }}`
            🌿 Rama: `${{ github.ref_name }}`
            👤 Actor: `${{ github.actor }}`
            📝 Commit: `${{ github.sha }}`
            🔍 HTML Lint: ${{ needs.html-lint.result }}
            🧪 Tests: ${{ needs.tests.result }}
            🔗 Link Checker: ${{ needs.link-checker.result }}
            🚀 Deploy: ${{ needs.deploy.result }}
