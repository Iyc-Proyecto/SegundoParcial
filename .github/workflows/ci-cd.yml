name: CI Pipeline

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  html-lint:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: htmlhint "**/*.html"

  tests:
    name: Correr Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Correr tests
        run: npm test

  link-checker:
    name: Chequeo de Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Chequear links
        run: npm run links

  deploy:
    name: Deploy a Vercel
    needs: [html-lint, tests, link-checker]
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy a Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    name: Notificar a Discord
    needs: [html-lint, tests, link-checker, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notificar Éxito
        if: ${{ needs.html-lint.result == 'success' && needs.tests.result == 'success' && needs.link-checker.result == 'success' && needs.deploy.result == 'success' }}
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ✅ Pipeline exitoso
            Repo: ${{ github.repository }}
            Rama: ${{ github.ref_name }}
            Autor: ${{ github.actor }}

      - name: Notificar Fallo
        if: ${{ needs.html-lint.result != 'success' || needs.tests.result != 'success' || needs.link-checker.result != 'success' || needs.deploy.result != 'success' }}
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ❌ Pipeline fallido
            Repo: ${{ github.repository }}
            Autor: ${{ github.actor }}
            Falló: ${{ needs.html-lint.result == 'failure' && 'HTML Lint' || needs.tests.result == 'failure' && 'Tests' || needs.link-checker.result == 'failure' && 'Link Checker' || needs.deploy.result == 'failure' && 'Deploy' || 'desconocido' }}
            Commit: ${{ github.sha }}
            Ver error: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
