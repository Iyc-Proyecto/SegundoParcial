name: CI Pipeline

on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  pull_request:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  html-lint:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: htmlhint "**/*.html"

  tests:
    name: Correr Tests
    needs: html-lint
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Correr tests
        run: npm test

  link-checker:
    name: Chequeo de Links
    needs: tests
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chequear links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.html' '**/*.md'
          fail: true

  deploy:
    name: Deploy a Vercel
    needs: link-checker
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy a Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    name: Notificar a Discord
    needs: [html-lint, tests, link-checker, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: >-
            ${{ (needs.html-lint.result == 'success' && needs.tests.result == 'success' && needs.link-checker.result == 'success' && needs.deploy.result == 'success')
            && format('✅ Pipeline exitoso\n📦 Repo: `{0}`\n🌿 Rama: `{1}`', github.repository, github.ref_name)
            || format('❌ Pipeline fallido\n📦 Repo: `{0}`\n🌿 Rama: `{1}`\n📝 Commit: `{2}`\n{3}\n🔎 Ver error: {4}/{0}/actions/runs/{5}',
            github.repository, github.ref_name, github.sha,
            needs.html-lint.result == 'failure' && '🔍 HTML Lint: failure' || needs.tests.result == 'failure' && '🧪 Tests: failure' || needs.link-checker.result == 'failure' && '🔗 Link Checker: failure' || needs.deploy.result == 'failure' && '🚀 Deploy: failure' || 'desconocido',
            github.server_url, github.run_id) }}
