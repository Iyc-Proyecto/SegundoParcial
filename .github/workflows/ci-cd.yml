name: CI Pipeline

on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  pull_request:
    branches:
      - "main"
      - "feature/*"
      - "fix/*"
      - "bug/*"
      - "hotfix/*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  html-lint:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: htmlhint "**/*.html"

  css-lint:
    name: Validar CSS
    needs: html-lint
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Validar archivos CSS
        run: stylelint "**/*.css"

  tests:
    name: Correr Tests
    needs: css-lint
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Correr tests
        run: node test.js

  link-checker:
    name: Chequeo de Links
    needs: tests
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chequear links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.html' '**/*.md'
          fail: true

  deploy:
    name: Deploy a Vercel
    needs: link-checker
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy a Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    name: Notificar a Discord
    needs: [html-lint, css-lint, tests, link-checker, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ${{ (needs.html-lint.result == 'success' && needs.css-lint.result == 'success' && needs.tests.result == 'success' && needs.link-checker.result == 'success' && needs.deploy.result == 'success') && '✅ Pipeline exitoso' || '❌ Pipeline fallido' }}
            📦 Repo: `${{ github.repository }}`
            🌿 Rama: `${{ github.ref_name }}`
            👤 Actor: `${{ github.actor }}`
            📝 Commit: `${{ github.sha }}`
            🔍 HTML Lint: ${{ needs.html-lint.result }}
            🎨 CSS Lint: ${{ needs.css-lint.result }}
            🧪 Tests: ${{ needs.tests.result }}
            🔗 Link Checker: ${{ needs.link-checker.result }}
            🚀 Deploy: ${{ needs.deploy.result }}
