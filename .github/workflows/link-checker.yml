name: Chequeo de Links

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chequear links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.html' '**/*.md'
          fail: true
